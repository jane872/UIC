# .github/workflows/train_and_validate.yml
name: ML Pipeline Train & Validate
on:
  push:
    branches: [ main, master ]  # 推送到主分支时触发
  pull_request:
    branches: [ main, master ]  # PR时触发
  workflow_dispatch:  # 手动触发（推荐测试用）

jobs:
  train-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"  # 缓存pip依赖，提升速度

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装Airflow/MLflow核心依赖（防止requirements遗漏）
          pip install apache-airflow==2.8.1 mlflow==2.8.1 scikit-learn==1.3.2 pandas==2.1.4

      - name: Create Data Directory
        run: mkdir -p data models

      - name: Run Preprocessing
        id: preprocess
        run: |
          python -c "from src.preprocess import preprocess_data; print(f'PREPROCESS_PATH={preprocess_data()}')" >> $GITHUB_OUTPUT

      - name: Run Model Training (Log to MLflow)
        id: train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}  # GitHub仓库秘钥配置MLflow地址
          MLFLOW_EXPERIMENT_NAME: "iris_classification_CI"
        run: |
          python -c "from src.train import train_model; model_path, metrics, run_id = train_model('${{ steps.preprocess.outputs.PREPROCESS_PATH }}', hyperparams={'C': 0.8, 'solver': 'liblinear'}); print(f'RUN_ID={run_id}'); print(f'METRICS={metrics}')" >> $GITHUB_OUTPUT

      - name: Model Validation (Quality Gate)
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python src/model_validation.py --run_id ${{ steps.train.outputs.RUN_ID }}

      - name: Register Model to MLflow (Staging)
        if: success()  # 验证通过才执行注册
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_MODEL_NAME: "Iris_Logistic_Regression_CI"
        run: |
          python -c "from src.register import register_model; register_model(run_id='${{ steps.train.outputs.RUN_ID }}', model_stage='Staging', model_desc='CI/CD自动训练-超参数C=0.8')"
